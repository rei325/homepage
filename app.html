<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おみくじ</title>

    <link rel="stylesheet" href="/src/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  </head>

  <body>
    <div class="container">
      <h1>🎍 おみくじ 🎍</h1>

      <div id="omikuji-box" class="box">御神</div>

      <div id="result-card" class="card">
        <img id="result-img" class="anime-img" src="" alt="結果画像" />
        <p id="result-text"></p>
      </div>

      <button id="omikuji-btn">おみくじを引く</button>

      <div class="feedback-area">
        <h2>💬 感想を送る</h2>
        <form id="feedback-form">
          <div class="form-group">
            <label for="basic_name">お名前</label>
            <input
              id="basic_name"
              name="basic_name"
              type="text"
              placeholder="お名前を入力してください"
              required
            />
          </div>
          <div class="form-group">
            <label for="user-comment">感想</label>
            <textarea
              id="user-comment"
              name="user-comment"
              rows="3"
              placeholder="感想を入力してください"
              required
            ></textarea>
          </div>
          <button type="submit" id="submit-btn">送信</button>
        </form>

        <p id="thanks-message" class="thanks-message">
          送信ありがとうございました！✨
        </p>
      </div>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
