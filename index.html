<!doctype html>

<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>homepage</title>
  </head>

  <body>
    <div class=swiper-center>
      <div class="swiper swiper1">
        <div class="swiper-wrapper">
          <div class="swiper-slide">Slide 1</div>
          <div class="swiper-slide">Slide 2</div>
          <div class="swiper-slide">Slide 3</div>
          <div class="swiper-slide">Slide 4</div>
        </div>

        <div class="swiper-pagination"></div>

        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <div class="swiper-scrollbar"></div>
      </div>
      <div class="swiper swiper2">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="public/pose_dance_ukareru_woman.png" alt="">
            <p>画像1を表示</p>
          </div>
          <div class="swiper-slide">
            <img src="public/onepiece14_enel.png" alt="">
            <p>画像２を表示</p>
          </div>
          <div class="swiper-slide">
            <img src="megane_hikaru_woman.png" alt="">
            <p>画像３を表示</p>
          </div>
          <div class="swiper-slide">
            <img src="public/pose_warau_kuchi_kakusu_man.png" alt="">
            <p>画像４を表示</p>
          </div>
        </div>
        <div class="swiper-pagination"></div>

        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <div class="swiper-scrollbar"></div>
        </div>
    </swiper-center>
    <div id="app">
      <form id="basic_form">
        <div class="form-group">
          <label for="basic_name">氏名</label>
          <input
            id="basic_name"
            name="basic_name"
            type="text"
            placeholder="氏名を入力してください"
          />
        </div>
        <div class="form-group">
          <label for="basic_email">メールアドレス</label>
          <input
            id="basic_email"
            name="basic_email"
            type="email"
            placeholder="メールアドレスを入力してください"
          />
        </div>

        <div class="form-group">
          <label for="basic_password">パスワード</label>
          <input
            id="basic_password"
            name="basic_password"
            type="password"
            placeholder="パスワードを入力してください"
          />
        </div>

        <div class="form-group">
          <label for="basic_age">年齢</label>
          <input
            id="basic_age"
            name="basic_age"
            type="text"
            placeholder="年齢を入力してください"
          />
        </div>

        <div class="form-group">
          <label for="basic_address">住所</label>
          <input
            id="basic_address"
            name="basic_address"
            type="text"
            placeholder="住所を入力してください"
          />
        </div>

        <button type="submit">送信</button>
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
